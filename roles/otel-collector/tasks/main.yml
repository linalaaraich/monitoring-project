---
- name: Create OTel Collector config directory
  file:
    path: "{{ otel_collector_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy OTel Collector configuration
  template:
    src: otel-collector-config.yaml.j2
    dest: "{{ otel_collector_config_dir }}/config.yaml"
    mode: "0644"
  notify: restart stack

- name: Copy OTel config to stack directory for Docker bind mount
  copy:
    src: "{{ otel_collector_config_dir }}/config.yaml"
    dest: "{{ stack_dir }}/otel-config.yaml"
    remote_src: yes
    mode: "0644"
  notify: restart stack
