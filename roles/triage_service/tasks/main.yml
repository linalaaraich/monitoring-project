---
- name: Create triage service directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ triage_service_config_dir }}"
    - "{{ triage_service_data_dir }}"

- name: Deploy triage service configuration
  template:
    src: triage-config.yml.j2
    dest: "{{ triage_service_config_dir }}/config.yml"
    mode: "0644"
  notify: restart stack
