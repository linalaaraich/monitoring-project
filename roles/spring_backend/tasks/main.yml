---
- name: Create OTel and log directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ otel_dir }}"
    - "{{ app_log_dir }}"
    - "{{ app_config_dir }}/build"

- name: Download OpenTelemetry Java agent
  get_url:
    url: "https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v{{ otel_agent_version }}/opentelemetry-javaagent.jar"
    dest: "{{ otel_agent_jar }}"
    mode: "0644"

- name: Deploy application Dockerfile
  template:
    src: Dockerfile.j2
    dest: "{{ app_config_dir }}/build/Dockerfile"
    mode: "0644"
  notify: restart stack
