grafana_port: 3000
prometheus_port: 9090

# Grafana SMTP config — Gmail App Password
# Generate app password: Google Account → Security → 2-Step Verification → App Passwords
grafana_smtp_host: "smtp.gmail.com:587"
grafana_smtp_user: "laaraichlina@gmail.com"
grafana_smtp_password: "{{ lookup('env', 'GRAFANA_SMTP_PASSWORD') }}"
grafana_smtp_from: "laaraichlina@gmail.com"
grafana_contact_email: "laaraichlina@gmail.com"

# Triage service webhook — Grafana Alerting sends all alerts here.
# Triage is now a ClusterIP Service inside k3s; Grafana reaches it via the
# Kong NodePort route (/triage is proxied through Kong, see kong-config.yaml).
# If Kong isn't exposing /triage yet, fall back to the cluster NodePort or
# an SSH-tunneled localhost:8090.
triage_service_webhook_url: "http://{{ k3s_host_ip }}:30080/triage/webhook/grafana"

loki_port: 3100
jaeger_port_ui: 16686
jaeger_port_collector: 4317
badger_data_dir: /data/badger
grafana_admin_password: "admin"
grafana_datasources:
  - prometheus
  - loki
  - jaeger
prometheus_scrape_interval: "15s"
prometheus_retention_days: 15
prometheus_targets:
  # Monitoring VM — static targets (the observability stack itself).
  # App / network / AI workloads have moved into k3s — they are discovered
  # via kubernetes_sd_configs instead of listed here. See k3s_sd_enabled.
  - job: "mon-cadvisor"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ cadvisor_port }}"
  - job: "mon-node-exporter"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ node_port }}"
  - job: "prometheus"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ prometheus_port }}"
  - job: "grafana"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ grafana_port }}"
  - job: "loki"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ loki_port }}"
  - job: "jaeger"
    host: "{{ monitoring_vm_ip }}"
    port: "14269"
  - job: "otel-collector"
    host: "{{ monitoring_vm_ip }}"
    port: "8888"

loki_retention_days: 7

# --- Kubernetes service discovery ---
# Default ON: Prometheus uses kubernetes_sd_configs to discover every pod
# annotated with `prometheus.io/scrape: "true"` in the k3s cluster, routed
# through the API server proxy (no pod-network reachability required).
# Requires: /etc/prometheus/k3s-token and /etc/prometheus/k3s-ca.crt already
# present on the monitoring VM — the k8s-manifests.yml playbook ships them.
k3s_sd_enabled: true
# k3s_host_ip: set in group_vars/all.yml or group_vars/k3s_cluster.yml
