grafana_port: 3000
prometheus_port: 9090
alertmanager_port: 9093

# Alertmanager SMTP config — Gmail free tier
# Generate app password: Google Account → Security → 2-Step Verification → App Passwords
alertmanager_smtp_smarthost: "smtp.gmail.com:587"
alertmanager_smtp_from: "laaraichlina@gmail.com"
alertmanager_smtp_username: "laaraichlina@gmail.com"
alertmanager_smtp_password: "{{ lookup('env', 'ALERTMANAGER_SMTP_PASSWORD') }}"
alertmanager_receiver_email: "laaraichlina@gmail.com"

# Grafana SMTP config — reuses the same Gmail App Password as Alertmanager
# This enables Grafana's built-in email for contact points (Unified Alerting)
grafana_smtp_host: "smtp.gmail.com:587"
grafana_smtp_user: "laaraichlina@gmail.com"
grafana_smtp_password: "{{ lookup('env', 'ALERTMANAGER_SMTP_PASSWORD') }}"
grafana_smtp_from: "laaraichlina@gmail.com"
grafana_contact_email: "laaraichlina@gmail.com"
loki_port: 3100
jaeger_port_ui: 16686
jaeger_port_collector: 4317
badger_data_dir: /data/badger
grafana_admin_password: "admin"
grafana_datasources:
  - prometheus
  - loki
  - jaeger
prometheus_scrape_interval: "15s"
prometheus_retention_days: 15
prometheus_targets:
  - job: "app-spring-actuator"
    host: "192.168.127.15"
    port: "8000"
    metrics_path: "/actuator/prometheus"
  - job: "app-cadvisor"
    host: "192.168.127.30"
    port: "{{ cadvisor_port }}"
  - job: "app-node-exporter"
    host: "192.168.127.30"
    port: "{{ node_port }}"

  - job: "net-node-exporter"
    host: "192.168.127.15"
    port: "{{ node_port }}"
  - job: "net-kong"
    host: "192.168.127.15"
    port: "8001"
    metrics_path: "/metrics"
  - job: "net-cadvisor"
    host: "192.168.127.15"
    port: "{{ cadvisor_port }}"

  - job: "mon-cadvisor"
    host: "192.168.127.10"
    port: "{{ cadvisor_port }}"
  - job: "mon-node-exporter"
    host: "192.168.127.10"
    port: "{{ node_port }}"
  - job: "prometheus"
    host: "192.168.127.10"
    port: "{{ prometheus_port }}"
  - job: "grafana"
    host: "192.168.127.10"
    port: "{{ grafana_port }}"
  - job: "loki"
    host: "192.168.127.10"
    port: "{{ loki_port }}"
  - job: "jaeger"
    host: "192.168.127.10"
    port: "14269"
  - job: "app-mysql"
    host: "192.168.127.30"
    port: "9104"
  - job: "otel-collector"
    host: "192.168.127.10"
    port: "8888"
  - job: "alertmanager"
    host: "192.168.127.10"
    port: "{{ alertmanager_port }}"
loki_retention_days: 7
