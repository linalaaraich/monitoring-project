grafana_port: 3000
prometheus_port: 9090

# Grafana SMTP config — Gmail App Password
# Generate app password: Google Account → Security → 2-Step Verification → App Passwords
grafana_smtp_host: "smtp.gmail.com:587"
grafana_smtp_user: "laaraichlina@gmail.com"
grafana_smtp_password: "{{ lookup('env', 'GRAFANA_SMTP_PASSWORD') }}"
grafana_smtp_from: "laaraichlina@gmail.com"
grafana_contact_email: "laaraichlina@gmail.com"

# Triage service webhook — Grafana Alerting sends all alerts here
triage_service_webhook_url: "http://{{ ai_vm_ip }}:8090/webhook/grafana"

loki_port: 3100
jaeger_port_ui: 16686
jaeger_port_collector: 4317
badger_data_dir: /data/badger
grafana_admin_password: "admin"
grafana_datasources:
  - prometheus
  - loki
  - jaeger
prometheus_scrape_interval: "15s"
prometheus_retention_days: 15
prometheus_targets:
  # Application VM targets
  - job: "app-spring-actuator"
    host: "{{ network_vm_ip }}"
    port: "8000"
    metrics_path: "/actuator/prometheus"
  - job: "app-cadvisor"
    host: "{{ application_vm_ip }}"
    port: "{{ cadvisor_port }}"
  - job: "app-node-exporter"
    host: "{{ application_vm_ip }}"
    port: "{{ node_port }}"

  # Network VM targets
  - job: "net-node-exporter"
    host: "{{ network_vm_ip }}"
    port: "{{ node_port }}"
  - job: "net-kong"
    host: "{{ network_vm_ip }}"
    port: "8001"
    metrics_path: "/metrics"
  - job: "net-cadvisor"
    host: "{{ network_vm_ip }}"
    port: "{{ cadvisor_port }}"

  # Monitoring VM targets
  - job: "mon-cadvisor"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ cadvisor_port }}"
  - job: "mon-node-exporter"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ node_port }}"
  - job: "prometheus"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ prometheus_port }}"
  - job: "grafana"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ grafana_port }}"
  - job: "loki"
    host: "{{ monitoring_vm_ip }}"
    port: "{{ loki_port }}"
  - job: "jaeger"
    host: "{{ monitoring_vm_ip }}"
    port: "14269"
  - job: "otel-collector"
    host: "{{ monitoring_vm_ip }}"
    port: "8888"

  # AI/LLM VM targets
  - job: "ai-triage-service"
    host: "{{ ai_vm_ip }}"
    port: "8090"
  - job: "ai-node-exporter"
    host: "{{ ai_vm_ip }}"
    port: "{{ node_port }}"
  - job: "ai-cadvisor"
    host: "{{ ai_vm_ip }}"
    port: "{{ cadvisor_port }}"

loki_retention_days: 7
