# Laptop-workstation group vars. Override role defaults here to keep your
# specific laptop config out of the role (which is generic). The role's
# defaults/main.yml is the source of truth for the full tunable list.

# Compose location matches your current manual setup
laptop_compose_dir: "/home/lina/cires-ai"

# Image tags — swap to pin a specific SHA if you're testing a build
triage_image_tag: "main"
mcp_image_tag: "laptop-dev"

# Current model on the GPU laptop
laptop_ollama_model: "qwen2.5:7b"

# Monitoring-vm tailscale IP (resolves via MagicDNS from adolin-wsl too)
monitoring_vm_ip: "100.74.21.104"
laptop_grafana_url: "http://100.74.21.104:3000"

# The MCP images (cires/mcp-*:laptop-dev) are LOCAL-ONLY builds on adolin-wsl
# — never pushed to a registry. A bulk `docker compose pull` would try to
# fetch them from docker.io/cires/* and fail. Watchtower already handles
# pulling the one remote image (ghcr.io/linalaaraich/monitoring-triage-service)
# in the background every 60s, so the ansible role's pull step is redundant.
# Override to true only if you want ansible to force-pull a specific tag
# (e.g. `--extra-vars 'laptop_compose_pull=true triage_image_tag=sha-abc1234'`).
laptop_compose_pull: false
