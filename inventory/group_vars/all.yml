stack_dir: /opt/stack
admin_email: laaraichlina@gmail.com
ssh_port: 22

# UFW on the VMs is redundant with AWS security groups and its hardcoded
# 192.168.127.0/24 rules don't apply to AWS VPC (10.0.0.0/16). Leave false
# for AWS deploys; set true only for on-prem VM deploys.
firewall_enabled: false
ansible_control_ip: 192.168.127.20

# VM IPs — update from Terraform outputs for AWS deployment
# Private IPs for inter-service traffic (stays inside VPC, no egress charges).
monitoring_vm_ip: "10.0.1.68"
monitoring_vm_public_ip: "52.202.21.192"  # EIP; used for URLs rendered into operator browsers
# Legacy VM IPs (docker-compose path, replaced by k3s in Sprint 2 extension)
application_vm_ip: "<UNUSED_K3S_PATH>"
network_vm_ip: "<UNUSED_K3S_PATH>"
ai_vm_ip: "<UNUSED_K3S_PATH>"

# AWS managed services — update from Terraform outputs
rds_endpoint: "observability-rca-mysql.ccle6aaiufrf.us-east-1.rds.amazonaws.com"
rds_port: 3306
cloudfront_domain: "<DISABLED_see_enable_cloudfront>"

common_packages:
  - curl
  - wget
  - vim
  - htop
  - net-tools
  - jq
  - unzip
  - ca-certificates
  - gnupg
  - rsync

docker_compose_version: "5.0.1"

cadvisor_port: 8081
node_port: 9100
loki_push_endpoint: "http://{{ monitoring_vm_ip }}:3100/loki/api/v1/push"
jaeger_endpoint: "http://{{ monitoring_vm_ip }}:4317"
prometheus_host: "{{ monitoring_vm_ip }}"

# Jaeger ports (needed by OTel Collector on all VMs)
jaeger_otlp_grpc_port: 4317
jaeger_host_otlp_grpc_port: 4327
loki_port: 3100

# OTel Collector
otel_collector_version: "0.120.0"
otel_collector_config_dir: /etc/otel-collector
otel_collector_grpc_port: 4317
otel_collector_http_port: 4318
otel_collector_metrics_port: 8888
otel_collector_health_port: 13133

# k3s cluster endpoints (private IPs — internal to VPC)
k3s_host_ip: "10.0.1.194"
gpu_host_ip: "<UNUSED_CPU_OLLAMA>"
