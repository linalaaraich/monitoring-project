[defaults]
# Default to the tailnet inventory — k3s joined the tailnet 2026-04-28, so
# all 3 managed nodes (monitoring-vm, k3s, adolin-wsl) are reachable via
# MagicDNS over WireGuard. Public-IP runs are still possible via
# `ansible-playbook -i inventory/production.yml ...` if the tailnet is degraded.
inventory = inventory/tailnet.yml
private_key_file = ~/.ssh/ansible_key
remote_user = deploy
host_key_checking = False
forks = 3
pipelining = True
roles_path = roles
retry_files_enabled = True
timeout = 60

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
