---
# Integration test playbook for observability stack
# Runs on control node (localhost) and validates service health and data flows
# Usage: ansible-playbook playbooks/integration.yml --tags "connectivity,health"

- name: Validate infrastructure connectivity
  hosts: localhost
  gather_facts: false
  tags: [connectivity]
  vars:
    monitoring_ip: "192.168.127.10"
    network_ip: "192.168.127.15"
    application_ip: "192.168.127.30"

  tasks:
    - name: Check SSH connectivity to all VMs
      ansible.builtin.ping:
      delegate_to: "{{ item }}"
      loop:
        - monitoring-vm
        - network-vm
        - application-vm
      tags: [ping]

    - name: Validate monitoring services health
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:{{ item.port }}{{ item.path }}"
        status_code: "{{ item.status | default(200) }}"
        timeout: 10
      loop:
        - { service: "Prometheus", port: 9090, path: "/-/ready" }
        - { service: "Alertmanager", port: 9093, path: "/-/healthy" }
        - { service: "Loki", port: 3100, path: "/ready" }
        - { service: "Jaeger UI", port: 16686, path: "/" }
        - { service: "OTel Collector metrics", port: 8888, path: "/metrics" }
        - { service: "Grafana API", port: 3000, path: "/api/health" }
      loop_control:
        label: "{{ item.service }} ({{ monitoring_ip }}:{{ item.port }})"
      tags: [health, monitoring]

    - name: Validate network services health
      ansible.builtin.uri:
        url: "http://{{ network_ip }}:{{ item.port }}{{ item.path }}"
        status_code: "{{ item.status | default(200) }}"
        timeout: 10
      loop:
        - { service: "Kong Proxy", port: 8000, path: "/" }
        - { service: "Kong Admin", port: 8001, path: "/status" }
        - { service: "Node Exporter", port: 9100, path: "/metrics" }
        - { service: "cAdvisor", port: 8081, path: "/metrics" }
      tags: [health, network]

    - name: Validate application services health
      ansible.builtin.uri:
        url: "http://{{ application_ip }}:{{ item.port }}{{ item.path }}"
        status_code: "{{ item.status | default(200) }}"
        timeout: 10
      loop:
        - { service: "Spring Boot API", port: 80, path: "/api/employee" }
        - { service: "MySQL Exporter", port: 9104, path: "/metrics" }
        - { service: "Node Exporter", port: 9100, path: "/metrics" }
        - { service: "cAdvisor", port: 8081, path: "/metrics" }
      tags: [health, application]

    - name: Verify MySQL TCP connectivity
      ansible.builtin.wait_for:
        host: "{{ application_ip }}"
        port: 3306
        timeout: 5
      tags: [health, application]

- name: Generate test traffic and validate observability data flows
  hosts: localhost
  gather_facts: false
  tags: [load, verification]
  vars:
    network_ip: "192.168.127.15"
    monitoring_ip: "192.168.127.10"
  tasks:
    - name: Run load test script to generate traces
      ansible.builtin.shell:
        cmd: "cd /root/monitoring-project && ./load-test.sh"
      changed_when: false
      register: load_test_result
      tags: [load]

    - name: Display load test summary
      ansible.builtin.debug:
        var: load_test_result.stdout_lines
      tags: [load]

    - name: Wait a moment for traces to be processed
      ansible.builtin.pause:
        seconds: 10
      tags: [load]

    - name: Query Jaeger for traces (check if any traces present)
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:16686/api/traces?service={{ item }}"
        return_content: yes
        status_code: 200
      loop:
        - "react-springboot-app"
        - "kong"
      register: jaeger_traces
      ignore_errors: yes
      tags: [verification, traces]

    - name: Display trace count
      ansible.builtin.debug:
        msg: "Service {{ item.item }} traces found: {{ item.json.data | length }}"
      loop: "{{ jaeger_traces.results }}"
      when: item.json is defined
      tags: [verification, traces]

    - name: Verify Loki has logs with trace_id
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:3100/loki/api/v1/query"
        method: GET
        url_username: ""
        url_password: ""
        body_format: json
        return_content: yes
        status_code: 200
        validate_certs: false
      ignore_errors: yes
      register: loki_query
      tags: [verification, logs]

    - name: Display Loki query result
      ansible.builtin.debug:
        var: loki_query.json
      tags: [verification, logs]

    - name: Verify Prometheus has metrics for Kong requests
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:9090/api/v1/query"
        method: GET
        body_format: json
        return_content: yes
        status_code: 200
        validate_certs: false
        url_username: ""
        url_password: ""
        body: '{"query": "kong_http_requests_total"}'
      register: prometheus_query
      ignore_errors: yes
      tags: [verification, metrics]

    - name: Display Prometheus metric result
      ansible.builtin.debug:
        var: prometheus_query.json
      tags: [verification, metrics]

    - name: Verify Loki metrics target is up
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:9090/api/v1/query"
        method: GET
        body_format: json
        return_content: yes
        status_code: 200
        validate_certs: false
        url_username: ""
        url_password: ""
        body: '{"query": "up{job=\"loki\"}"}'
      register: loki_up_query
      ignore_errors: yes
      tags: [verification, metrics]

    - name: Display Loki target status
      ansible.builtin.debug:
        msg: "Loki scrape target up status: {{ loki_up_query.json.data.result[0].value[1] | default('unknown') }}"
      when: loki_up_query.json.data.result | length > 0
      tags: [verification, metrics]

    - name: Verify Loki build info metric exists
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:9090/api/v1/query"
        method: GET
        body_format: json
        return_content: yes
        status_code: 200
        validate_certs: false
        url_username: ""
        url_password: ""
        body: '{"query": "loki_build_info"}'
      register: loki_build_info_query
      ignore_errors: yes
      tags: [verification, metrics]

    - name: Display Loki build info
      ansible.builtin.debug:
        var: loki_build_info_query.json
      when: loki_build_info_query.json is defined
      tags: [verification, metrics]

    - name: Verify Loki distributor bytes received metric exists
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:9090/api/v1/query"
        method: GET
        body_format: json
        return_content: yes
        status_code: 200
        validate_certs: false
        url_username: ""
        url_password: ""
        body: '{"query": "loki_distributor_bytes_received_total"}'
      register: loki_distributor_query
      ignore_errors: yes
      tags: [verification, metrics]

    - name: Display Loki distributor metric result
      ansible.builtin.debug:
        var: loki_distributor_query.json
      when: loki_distributor_query.json is defined
      tags: [verification, metrics]

    - name: List all Loki metrics for verification
      ansible.builtin.uri:
        url: "http://{{ monitoring_ip }}:9090/api/v1/query"
        method: GET
        body_format: json
        return_content: yes
        status_code: 200
        validate_certs: false
        url_username: ""
        url_password: ""
        body: '{"query": "{__name__=~\\"loki_.*\\"}"}'
      register: loki_all_metrics_query
      ignore_errors: yes
      tags: [verification, metrics]

    - name: Display Loki metrics count
      ansible.builtin.debug:
        msg: "Found {{ loki_all_metrics_query.json.data.result | length | default(0) }} Loki metrics"
      when: loki_all_metrics_query.json is defined
      tags: [verification, metrics]

- name: Integration test summary
  hosts: localhost
  gather_facts: false
  tags: [summary]
  tasks:
    - name: Print success message
      ansible.builtin.debug:
        msg: "Integration tests completed. Check outputs above for any failures."