{{- if or .Values.database.username .Values.database.password }}
# Spring Boot DB credentials secret — consumed by deployment.yaml via
# secretKeyRef (SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD).
# Previously created out-of-band with `kubectl create secret` and silently
# missing on fresh installs — pod went CreateContainerConfigError. Now
# managed by Helm so `helm install spring-boot ...` is self-contained.
#
# Pass on install:
#   helm install spring-boot charts/spring-boot \
#     -n app --create-namespace \
#     --set database.username=$DB_USER \
#     --set database.password=$DB_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spring-boot.fullname" . }}-db-secret
  labels:
    {{- include "spring-boot.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.database.username | default "appuser" | quote }}
  password: {{ .Values.database.password | default "" | quote }}
{{- end }}
