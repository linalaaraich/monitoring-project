apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spring-boot.fullname" . }}-config
  labels:
    {{- include "spring-boot.labels" . | nindent 4 }}
data:
  spring.datasource.url: {{ .Values.database.url | quote }}
  server.port: {{ .Values.service.targetPort | quote }}
  management.endpoints.web.exposure.include: "health,info,prometheus,metrics"
  management.endpoint.health.show-details: "always"
  management.endpoint.health.probes.enabled: "true"
  management.metrics.export.prometheus.enabled: "true"
  management.metrics.tags.application: {{ .Values.otel.serviceName | quote }}
