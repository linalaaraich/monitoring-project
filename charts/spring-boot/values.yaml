nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: mukundmadhav/react-springboot-mysql
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# RDS connection (from Terraform outputs).
# Prefer passing `host` via --set on install; the chart composes the JDBC
# URL from host/port/name so the caller doesn't have to remember the
# jdbc:mysql:// prefix. `url` still wins if explicitly set.
database:
  host: ""       # e.g. observability-rca-mysql.xxx.us-east-1.rds.amazonaws.com
  port: 3306
  name: "app_db"
  url: ""        # takes precedence over host/port/name when non-empty
  username: "appuser"
  password: ""

# OTel Java Agent.
# Use the same name across all three pillars (Loki service_name, Prometheus
# app label, Jaeger service) so alerts with a single "service" value can be
# looked up in every system. Previously this was "react-springboot-app"
# which didn't match the alert labels — broke MCP context fan-out.
otel:
  enabled: true
  agentVersion: "2.11.0"
  serviceName: "spring-boot"
  exporterEndpoint: "http://otel-collector.observability.svc.cluster.local:4317"

# Spring Boot's default log level is INFO which emits very few lines under
# steady traffic — nothing meaningful per request. For a demo where we want
# to show log→trace click-through on every request, bump the Spring Web
# logger to DEBUG (Spring + Tomcat log per request, all lines carry
# trace_id via LOGGING_PATTERN_LEVEL). Set to "INFO" for production.
logging:
  webLogLevel: "DEBUG"

# Prometheus scraping annotations
prometheus:
  scrape: true
  port: 8080
  path: /actuator/prometheus

serviceAccount:
  create: true
  name: ""
