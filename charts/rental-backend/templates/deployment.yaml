apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
    version: v1
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: backend
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.httpGet.path }}
            port: {{ .Values.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.readinessProbe.httpGet.path }}
            port: {{ .Values.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        resources:
          requests:
            memory: "{{ .Values.resources.requests.memory }}"
            cpu: "{{ .Values.resources.requests.cpu }}"
          limits:
            memory: "{{ .Values.resources.limits.memory }}"
            cpu: "{{ .Values.resources.limits.cpu }}"
        volumeMounts:
        - name: otel-agent
          mountPath: /otel-agent
          readOnly: true
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?allowPublicKeyRetrieval=true&useSSL=false"
        - name: SPRING_DATASOURCE_USERNAME
          value: {{ .Values.database.user | quote }}
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: {{ .Values.env.SPRING_JPA_HIBERNATE_DDL_AUTO | quote }}
        - name: SPRING_JPA_SHOW_SQL
          value: {{ .Values.env.SPRING_JPA_SHOW_SQL | quote }}
        - name: ENVIRONMENT
          value: {{ .Values.env.ENVIRONMENT | quote }}
        - name: LOGGING_LEVEL_ROOT
          value: {{ .Values.env.LOG_LEVEL | quote }}
        - name: JAVA_TOOL_OPTIONS
          value: "-javaagent:/otel-agent/opentelemetry-javaagent.jar"
        - name: OTEL_SERVICE_NAME
          value: "rental-backend"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_PROPAGATORS
          value: "tracecontext,baggage,b3multi"
        - name: OTEL_INSTRUMENTATION_JDBC_ENABLED
          value: "true"
        - name: OTEL_INSTRUMENTATION_SPRING_WEB_ENABLED
          value: "true"
        - name: OTEL_INSTRUMENTATION_SPRING_WEBMVC_ENABLED
          value: "true"
      initContainers:
      - name: otel-agent-init
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          wget -O /otel-agent/opentelemetry-javaagent.jar \
            "https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.11.0/opentelemetry-javaagent.jar"
        volumeMounts:
        - mountPath: /otel-agent
          name: otel-agent
      volumes:
      - name: otel-agent
        emptyDir: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app: backend