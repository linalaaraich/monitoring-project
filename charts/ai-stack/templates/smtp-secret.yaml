{{- if or .Values.smtp.user .Values.smtp.password }}
# SMTP credentials for the triage service — escalation emails.
# Referenced by triage-deployment.yaml via secretKeyRef (6 keys: host,
# port, user, password, from, notificationEmail).
#
# Previously this secret was created manually with `kubectl create secret`;
# the chart referenced it but didn't produce it, so a fresh
# `helm install ai-stack` left triage in CreateContainerConfigError.
#
# Pass credentials on install:
#   helm install ai-stack charts/ai-stack \
#     -n ai --create-namespace \
#     --set smtp.user=$GMAIL_ADDR \
#     --set smtp.password=$GMAIL_APP_PASSWORD \
#     --set smtp.from=$GMAIL_ADDR \
#     --set smtp.notificationEmail=$ONCALL_ADDR
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-stack.fullname" . }}-smtp-secret
  labels:
    {{- include "ai-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  host: {{ .Values.smtp.host | default "smtp.gmail.com" | quote }}
  port: {{ .Values.smtp.port | default 587 | quote }}
  user: {{ .Values.smtp.user | default "" | quote }}
  password: {{ .Values.smtp.password | default "" | quote }}
  from: {{ .Values.smtp.from | default .Values.smtp.user | quote }}
  notificationEmail: {{ .Values.smtp.notificationEmail | default .Values.smtp.user | quote }}
{{- end }}
