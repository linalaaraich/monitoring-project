apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-stack.fullname" . }}-ollama-data
  labels:
    {{- include "ai-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.ollama.storage }}
