nameOverride: ""
fullnameOverride: ""

imageTag: "2026-04-22c"

triageService:
  image: cires/triage-service
  port: 8090
  # Layer 2 pre-LLM suppression — if the same (alert_name, service) was
  # dismissed (or suppressed) within the lookback window, skip the Ollama
  # call entirely. Saves 3–15 min of CPU inference per noisy repeat alert.
  suppressionEnabled: true
  historyLookbackMinutes: 15
  # CPU inference on llama3.2:3b with real-sized, 3-pillar context takes
  # 10-15 min per Ollama call in practice (verified empirically on an
  # AWS t3.xlarge with 4 vCPUs). The per-request timeout must give the
  # first attempt enough room to complete rather than timing out and
  # retrying with a fresh large prompt. On GPU these drop to ~30 / ~300.
  ollamaRequestTimeout: 1800   # 30 min per Ollama call (CPU)
  pipelineTimeout: 2400        # 40 min total pipeline budget (fits 1 retry)

  # Prompt-size controls. Smaller = much faster inference on CPU, at the
  # cost of less evidence for the LLM. Empirically, with these values:
  #   - Ollama completes in 3-10 min (not 10-20)
  #   - The LLM still produces schema-conformant JSON reliably
  #   - Evidence is sparse but sufficient for a "escalate vs dismiss"
  #     call plus a short RCA. Bump back up on GPU.
  lokiLogLimit: 5
  jaegerTraceLimit: 1
  prometheusRangeMinutes: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

mcpServers:
  prometheus:
    image: cires/mcp-prometheus
    port: 8091
  loki:
    image: cires/mcp-loki
    port: 8092
  jaeger:
    image: cires/mcp-jaeger
    port: 8093
  drain3:
    image: cires/mcp-drain3
    port: 8094
  rcaHistory:
    image: cires/mcp-rca-history
    port: 8095
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ollama:
  image: ollama/ollama
  tag: latest
  port: 11434
  # CPU inference on a 3B model. For GPU nodes, flip gpu.enabled=true and bump
  # model to llama3.1:8b. ~2 GB resident on CPU; 10-20s per response at 4 vCPU.
  model: "llama3.2:3b"
  # Keep the model resident for this long between calls. Default 5m causes
  # every triage call to pay cold-load penalty; 6h keeps it warm for a demo.
  keepAlive: "6h"
  storage: 10Gi
  gpu:
    enabled: false
    count: 1
  # Set to false if running on same node, true if on separate GPU node
  separateNode: false
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
    limits:
      cpu: "3"
      memory: 6Gi

# External service endpoints (monitoring VM).
# Prefer setting `monitoring.host` (a single IP or hostname); the chart
# composes the URLs from it and standard ports, so you don't have to
# remember three separate flags on helm install. Explicit per-URL values
# still win if set.
monitoring:
  host: ""                     # e.g. 10.0.1.68 (monitoring VM private IP)
  prometheusUrl: ""            # takes precedence over host-based composition
  lokiUrl: ""
  jaegerUrl: ""
  prometheusPort: 9090
  lokiPort: 3100
  jaegerPort: 16686

# SMTP for escalation emails
smtp:
  host: "smtp.gmail.com"
  port: 587
  user: ""
  password: ""
  from: ""
  notificationEmail: ""

# Grafana dashboard URL for email links. Leave empty to auto-compose from
# monitoring.host (uses :3000 — the default Grafana port).
grafanaDashboardUrl: ""

# Drain3 config
drain3:
  stateDir: /data/drain3_state
  pollInterval: 30

# RCA History database
rcaHistory:
  dbPath: /data/rca_history.db

prometheus:
  scrape: true
