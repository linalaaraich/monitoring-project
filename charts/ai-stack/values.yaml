nameOverride: ""
fullnameOverride: ""

imageTag: "latest"

triageService:
  image: cires/triage-service
  port: 8090
  # CPU inference on llama3.2:3b takes 60–180s per call under a real-sized
  # prompt. Ollama per-request timeout must exceed that; pipeline timeout
  # must accommodate retries. Defaults assume CPU Ollama on t3.xlarge.
  # For GPU nodes, these can be dropped back to 30 / 300.
  ollamaRequestTimeout: 300
  pipelineTimeout: 900

  # Prompt-size controls — shrinking these shortens the LLM prompt, which
  # speeds up CPU inference dramatically. Bump back up once on GPU.
  lokiLogLimit: 10
  jaegerTraceLimit: 3
  prometheusRangeMinutes: 5
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

mcpServers:
  prometheus:
    image: cires/mcp-prometheus
    port: 8091
  loki:
    image: cires/mcp-loki
    port: 8092
  jaeger:
    image: cires/mcp-jaeger
    port: 8093
  drain3:
    image: cires/mcp-drain3
    port: 8094
  rcaHistory:
    image: cires/mcp-rca-history
    port: 8095
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ollama:
  image: ollama/ollama
  tag: latest
  port: 11434
  # CPU inference on a 3B model. For GPU nodes, flip gpu.enabled=true and bump
  # model to llama3.1:8b. ~2 GB resident on CPU; 10-20s per response at 4 vCPU.
  model: "llama3.2:3b"
  # Keep the model resident for this long between calls. Default 5m causes
  # every triage call to pay cold-load penalty; 6h keeps it warm for a demo.
  keepAlive: "6h"
  storage: 10Gi
  gpu:
    enabled: false
    count: 1
  # Set to false if running on same node, true if on separate GPU node
  separateNode: false
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
    limits:
      cpu: "3"
      memory: 6Gi

# External service endpoints (monitoring VM)
monitoring:
  prometheusUrl: "http://MONITORING_VM_IP:9090"
  lokiUrl: "http://MONITORING_VM_IP:3100"
  jaegerUrl: "http://MONITORING_VM_IP:16686"

# SMTP for escalation emails
smtp:
  host: "smtp.gmail.com"
  port: 587
  user: ""
  password: ""
  from: ""
  notificationEmail: ""

# Grafana dashboard URL for email links
grafanaDashboardUrl: "http://MONITORING_VM_IP:3000"

# Drain3 config
drain3:
  stateDir: /data/drain3_state
  pollInterval: 30

# RCA History database
rcaHistory:
  dbPath: /data/rca_history.db

prometheus:
  scrape: true
