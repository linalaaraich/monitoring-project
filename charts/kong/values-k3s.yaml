# Values for upstream kong/kong Helm chart (v2.38.0)
# Install: helm install kong kong/kong -f charts/kong/values-k3s.yaml -n network --create-namespace

image:
  repository: kong
  tag: "3.9"

# Pure DB-less declarative mode. The upstream chart only mounts
# dblessConfig.configMap when the ingress-controller sidecar is disabled —
# otherwise Kong expects its admin API to be driven by KIC, conflicts with
# our declarative /kong/config/kong.yml file, and the ingress-controller
# container loops on "dial tcp [::1]:8444: connect: connection refused".
ingressController:
  enabled: false

env:
  database: "off"
  # Upstream chart mounts dblessConfig.configMap at /kong_dbless/, not /kong/config/
  declarative_config: /kong_dbless/kong.yml

dblessConfig:
  configMap: kong-config

proxy:
  enabled: true
  type: NodePort
  http:
    nodePort: 30080
  tls:
    enabled: false

admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
