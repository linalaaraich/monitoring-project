apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: network
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: backend-api
        url: http://spring-boot.app.svc.cluster.local:80
        routes:
          - name: api-route
            paths:
              - /api
            strip_path: false
          - name: actuator-route
            paths:
              - /actuator
            strip_path: false
        # (per-service OTel plugin removed — now at global level, see below)
      - name: frontend
        # Points at Spring Boot because the React frontend is bundled into the
        # Spring container (served at /). When CloudFront is enabled, replace
        # this URL with the CloudFront domain.
        url: http://spring-boot.app.svc.cluster.local:80
        routes:
          - name: frontend-route
            paths:
              - /
            strip_path: false
    # Plugins at the top level are applied globally (to every route/service).
    # Prometheus plugin enabled globally so Kong emits per-status-code,
    # per-latency, and bandwidth metrics — not just base nginx counters.
    # See: https://docs.konghq.com/hub/kong-inc/prometheus/
    plugins:
      - name: prometheus
        config:
          per_consumer: false
          status_code_metrics: true
          latency_metrics: true
          bandwidth_metrics: true
          upstream_health_metrics: true
      # OTel tracing at the GLOBAL level — every matched request gets a span
      # regardless of which service/route handled it. Ships OTLP/HTTP to the
      # in-cluster DaemonSet, which forwards to Jaeger on the monitoring VM.
      - name: opentelemetry
        config:
          traces_endpoint: "http://otel-collector.observability.svc.cluster.local:4318/v1/traces"
          sampling_rate: 1.0
          batch_span_count: 10
          batch_flush_delay: 1
          resource_attributes:
            service.name: kong-gateway
            service.version: "3.9"
