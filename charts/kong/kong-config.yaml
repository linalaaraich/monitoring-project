apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: network
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: backend-api
        url: http://spring-boot.app.svc.cluster.local:80
        routes:
          - name: api-route
            paths:
              - /api
            strip_path: false
          - name: actuator-route
            paths:
              - /actuator
            strip_path: false
        plugins:
          - name: opentelemetry
            config:
              endpoint: "http://otel-collector.observability.svc.cluster.local:4318/v1/traces"
              resource_attributes:
                service.name: kong-gateway
          - name: prometheus
      - name: frontend
        # Points at Spring Boot because the React frontend is bundled into the
        # Spring container (served at /). When CloudFront is enabled, replace
        # this URL with the CloudFront domain.
        url: http://spring-boot.app.svc.cluster.local:80
        routes:
          - name: frontend-route
            paths:
              - /
            strip_path: false
